<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background-color: #f4f6f9;
      }

      header {
        background-color: #222;
        padding: 1rem 2rem;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 2rem;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;
      }

      nav a:hover {
        color: #00bcd4;
      }

      main {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
      }

      form {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      input {
        padding: 0.7rem;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 1rem;
      }

      input:focus {
        outline: none;
        border-color: #00bcd4;
      }

      button {
        padding: 0.7rem;
        border: none;
        border-radius: 5px;
        background-color: #00bcd4;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #0097a7;
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Shop</a></li>
          <li><a href="/add-product">Add Product</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <form action="/add-product" method="POST">
        <input type="text" name="title" placeholder="Enter product title" />
        <button type="submit">Add Product</button>
      </form>
    </main>
  </body>
</html>
