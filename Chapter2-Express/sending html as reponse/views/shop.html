<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background-color: #f4f6f9;
      }

      header {
        background-color: #222;
        padding: 1rem 2rem;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 2rem;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;
      }

      nav a:hover {
        color: #00bcd4;
      }

      main {
        padding: 3rem 2rem;
        text-align: center;
      }

      h1 {
        margin-bottom: 1rem;
        color: #333;
      }

      .products {
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        gap: 2rem;
        flex-wrap: wrap;
      }

      .card {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        width: 200px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h2 {
        margin-bottom: 0.5rem;
        font-size: 1.2rem;
      }

      .card p {
        font-size: 0.9rem;
        color: #666;
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Shop</a></li>
          <li><a href="/add-product">Add Product</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>My Products</h1>
      <p>List of all the products...</p>

      <div class="products">
        <div class="card">
          <h2>Product 1</h2>
          <p>Sample description</p>
        </div>

        <div class="card">
          <h2>Product 2</h2>
          <p>Sample description</p>
        </div>

        <div class="card">
          <h2>Product 3</h2>
          <p>Sample description</p>
        </div>
      </div>
    </main>
  </body>
</html>
